name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress CD when a newer one starts on the same branch.
# Prevents wasted Actions minutes on rapid back-to-back merges (e.g. PR
# trains, release-please rebase loops).
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip release-please's own merge commit ("chore(main): release X.Y.Z")
    # because it only updates CHANGELOG.md / .release-please-manifest.json
    # — the deployable artifact is identical to the previous deploy.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        !startsWith(github.event.workflow_run.display_title, 'chore(main): release')
      )

    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          # Need the parent commit so paths-filter can diff against it
          # for workflow_run-triggered runs.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      # Detect whether the deployable image actually depends on any file in
      # this commit. Test-only, docs-only, .claude/-only, etc. changes are
      # skipped and save ~5–7 minutes of Cloud Run build time.
      # ``git diff`` is used instead of the dorny/paths-filter action because
      # the latter rejects ``HEAD~1`` as an invalid refspec when it tries to
      # ``git fetch`` the base — we already have HEAD~1 locally thanks to
      # ``fetch-depth: 2``.
      - name: Detect deploy-relevant changes
        id: changes
        if: github.event_name == 'workflow_run'
        run: |
          set -eu
          changed=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$changed"
          if echo "$changed" | grep -qE '^(src/|Dockerfile$|pyproject\.toml$|uv\.lock$|scripts/|\.github/workflows/cd\.yml$)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to deploy
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Deploying because event_name=workflow_dispatch"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.changes.outputs.code }}" == "true" ]]; then
            echo "Deploying because deploy-relevant files changed"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No deploy-relevant files changed; skipping deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - id: auth
        if: steps.gate.outputs.should_deploy == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - if: steps.gate.outputs.should_deploy == 'true'
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run
        if: steps.gate.outputs.should_deploy == 'true'
        run: |
          gcloud run deploy ${{ vars.CLOUDRUN_SERVICE }} \
            --project ${{ vars.GCP_PROJECT }} \
            --region ${{ vars.GCP_REGION }} \
            --service-account ${{ vars.GCP_SERVICE_ACCOUNT }} \
            --source . \
            --execution-environment gen2 \
            --memory 4Gi \
            --cpu 1 \
            --no-cpu-throttling \
            --clear-volumes --clear-volume-mounts \
            --cpu-boost \
            --set-env-vars "\
              GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT }},\
              GCS_BUCKET=${{ vars.GCS_BUCKET }},\
              PUBSUB_INVOKER_SA=${{ vars.PUBSUB_INVOKER_SA }},\
              PUBSUB_AUDIENCE=${{ vars.OAUTH_BASE_URL }}/internal/reload,\
              JQUANTS_CACHE_DIR=/tmp,\
              OAUTH_PROVIDER=google,\
              OAUTH_BASE_URL=${{ vars.OAUTH_BASE_URL }},\
              OAUTH_REQUIRE_CONSENT=false,\
              GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},\
              GITHUB_CLIENT_ID=${{ secrets.GH_OAUTH_CLIENT_ID }}" \
            --set-secrets "\
              GOOGLE_CLIENT_SECRET=google-oauth-client-secret:latest,\
              MCP_ENCRYPTION_KEY=mcp-encryption-key:latest,\
              JQUANTS_API_KEY=jquants-api-key:latest,\
              GITHUB_CLIENT_SECRET=github-oauth-client-secret:latest,\
              OAUTH_JWT_SIGNING_KEY=OAUTH_JWT_SIGNING_KEY:latest,\
              JQUANTS_ALLOWED_EMAILS=jquants-allowed-emails:latest"

      - name: Log in to GHCR
        if: steps.gate.outputs.should_deploy == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        if: steps.gate.outputs.should_deploy == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_sha || github.sha }}
