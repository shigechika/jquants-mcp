name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy jquants-dat-mcp \
            --project aikawa-dx \
            --region us-west1 \
            --source . \
            --execution-environment gen2 \
            --memory 8Gi \
            --cpu 2 \
            --set-env-vars "\
              GCS_BUCKET=aikawa-dx-jquants-dat-mcp,\
              JQUANTS_CACHE_DIR=/tmp,\
              JQUANTS_PLAN=standard,\
              OAUTH_PROVIDER=google,\
              OAUTH_BASE_URL=https://jquants-dat-mcp-29004083822.us-west1.run.app,\
              OAUTH_REQUIRE_CONSENT=false,\
              GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},\
              GITHUB_CLIENT_ID=${{ secrets.GH_OAUTH_CLIENT_ID }}" \
            --set-secrets "\
              GOOGLE_CLIENT_SECRET=google-oauth-client-secret:latest,\
              MCP_ENCRYPTION_KEY=mcp-encryption-key:latest,\
              JQUANTS_API_KEY=jquants-api-key:latest,\
              GITHUB_CLIENT_SECRET=github-oauth-client-secret:latest"
