name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Run release-please in JST so the CHANGELOG entry date matches the
    # JST merge day rather than the runner's UTC clock. release-please
    # formats the version-header date via `new Date().toLocaleDateString('en-CA')`
    # (changelog-notes/github.ts), which respects the TZ environment variable.
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Use a fine-grained PAT so that release-please's tag creation
          # triggers downstream workflows. GitHub's recursion-prevention
          # rule blocks GITHUB_TOKEN-authored events from firing workflow
          # runs (release.yml / PyPI publish / MCP registry publish).
          # Falls back to GITHUB_TOKEN on forks / CI-on-PR where the
          # secret is unavailable, keeping the release-please PR workflow
          # functional without the PAT.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
