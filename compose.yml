# Local Docker Compose deployment for jquants-mcp.
# Starts an HTTP MCP server on http://localhost:8080/mcp.
# No TLS, GCS, or OAuth required.
#
# Quick start:
#   JQUANTS_API_KEY=xxx docker compose up -d
#   # → MCP endpoint: http://localhost:8080/mcp
#
# With Bearer token auth (recommended if exposed beyond localhost):
#   JQUANTS_API_KEY=xxx MCP_BEARER_TOKEN=yyy docker compose up -d

services:
  jquants-mcp:
    image: ghcr.io/shigechika/jquants-mcp:latest
    # Bypass the Cloud Run entrypoint; invoke jquants-mcp directly.
    entrypoint: []
    command:
      - jquants-mcp
      - --transport
      - streamable-http
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      JQUANTS_API_KEY: ${JQUANTS_API_KEY}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-}
      # Override the Cloud Run default (/tmp) so the cache persists in the volume.
      JQUANTS_CACHE_DIR: /home/appuser/.cache/jquants-mcp
    volumes:
      - cache:/home/appuser/.cache/jquants-mcp
    restart: unless-stopped

volumes:
  cache:
