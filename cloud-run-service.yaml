apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: jquants-dat-mcp
  annotations:
    # Allow unauthenticated requests (protect via MCP_BEARER_TOKEN instead)
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Gen2 execution environment for larger memory and better performance
        run.googleapis.com/execution-environment: gen2
        # Single instance to avoid concurrent SQLite writes
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "1"
        # Faster startup with CPU boost
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      # Service account with GCS read/write permissions
      # Required roles: roles/storage.objectAdmin (on the GCS bucket)
      serviceAccountName: jquants-dat-mcp@PROJECT_ID.iam.gserviceaccount.com

      # Allow up to 3600s for graceful shutdown (final GCS upload)
      timeoutSeconds: 3600

      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPO/jquants-dat-mcp:latest
          ports:
            - containerPort: 8000

          resources:
            limits:
              # 2 Gi: cache.db is gcsfuse-mounted (not in memory)
              memory: 2Gi
              cpu: "2"

          env:
            # ---- GCS sync settings ----
            - name: GCS_BUCKET
              value: "YOUR_GCS_BUCKET_NAME"
            - name: GCS_PREFIX
              value: "jquants-dat-mcp/"
            - name: GCS_SYNC_INTERVAL
              value: "300"  # seconds between periodic uploads

            # ---- MCP server settings ----
            - name: PORT
              value: "8000"
            - name: JQUANTS_CACHE_DIR
              value: "/tmp"
            - name: JQUANTS_PLAN
              value: "premium"

            # ---- gcsfuse cache.db settings ----
            - name: JQUANTS_CACHE_DB_PATH
              value: "/mnt/gcs/cache.db"
            - name: JQUANTS_CACHE_DB_READONLY
              value: "true"

            # ---- Secrets (use Secret Manager in production) ----
            # Uncomment and replace with your Secret Manager secret names.
            #
            # - name: JQUANTS_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: jquants-api-key
            #       key: latest
            #
            # - name: MCP_BEARER_TOKEN
            #   valueFrom:
            #     secretKeyRef:
            #       name: mcp-bearer-token
            #       key: latest

          volumeMounts:
            - name: gcs-cache
              mountPath: /mnt/gcs
              readOnly: true

          # Liveness probe: check /mcp endpoint
          livenessProbe:
            httpGet:
              path: /mcp
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3

          # Startup probe: fast startup (no large download needed)
          startupProbe:
            httpGet:
              path: /mcp
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12  # up to 1 minute

      volumes:
        - name: gcs-cache
          csi:
            driver: gcsfuse.run.googleapis.com
            readOnly: true
            volumeAttributes:
              bucketName: aikawa-dx-jquants-dat-mcp
              mountOptions: "only-dir=jquants-dat-mcp,implicit-dirs"
