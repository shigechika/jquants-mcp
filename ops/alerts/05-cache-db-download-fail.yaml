displayName: "cache.db download failed"
documentation:
  content: |
    The background cache.db download from GCS failed on startup.
    Without cache.db the server falls back to live J-Quants API — slower and
    rate-limit-prone. Check GCS bucket ACLs and the gcs_sync.py log.

    Runbook: https://github.com/shigechika/jquants-mcp/blob/main/docs/runbooks/cache-db-missing.md
  mimeType: text/markdown
combiner: OR
conditions:
  - displayName: "download failure log pattern matched"
    conditionMatchedLog:
      # The startup path (entrypoint.sh Step 4 -> gcs_sync.py --init-cache)
      # emits the literal phrase "cache.db download failed" on a genuine
      # failure, via both gcs_sync.py's logger.error and the entrypoint echo.
      filter: |
        resource.type="cloud_run_revision"
        resource.labels.service_name="jquants-mcp"
        textPayload:"cache.db download failed"
alertStrategy:
  notificationRateLimit:
    period: 3600s
  autoClose: 86400s
notificationChannels:
  - __CHANNEL__
severity: WARNING
